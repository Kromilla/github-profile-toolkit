name: Update Profile Activity
description: Refresh a marked activity section in a GitHub profile README.
branding:
  icon: activity
  color: blue

inputs:
  readme-path:
    description: README file to update.
    required: false
    default: README.md
  max-events:
    description: Maximum number of activity lines to publish.
    required: false
    default: '5'
  start-marker:
    description: Start marker for the activity section.
    required: false
    default: '<!--START_SECTION:activity-->'
  end-marker:
    description: End marker for the activity section.
    required: false
    default: '<!--END_SECTION:activity-->'
  github-username:
    description: GitHub username to fetch public events from.
    required: false
    default: ''
  commit-message:
    description: Commit message used when changes are detected.
    required: false
    default: 'chore(profile): update recent activity'
  token:
    description: GitHub token for API requests.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Update activity section
      shell: bash
      env:
        README_PATH: ${{ inputs.readme-path }}
        MAX_EVENTS: ${{ inputs.max-events }}
        START_MARKER: ${{ inputs.start-marker }}
        END_MARKER: ${{ inputs.end-marker }}
        GITHUB_USERNAME: ${{ inputs.github-username != '' && inputs.github-username || github.repository_owner }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/../../scripts/updateActivity.js"

    - name: Commit and push changes
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "${{ inputs.readme-path }}"
        git diff --quiet && git diff --staged --quiet || (git commit -m "${{ inputs.commit-message }}" && git push)
